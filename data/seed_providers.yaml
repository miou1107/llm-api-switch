    models:
      - id: llama3.1-8b
        context_window: 131072
        max_output_tokens: 8192
        supports_streaming: true
        supports_function_calling: false
        rate_limits:
          rpm: 30
          rpd: 14400
          tpm: 1000000

      - id: qwen-3-235b-a22b-instruct-2507
